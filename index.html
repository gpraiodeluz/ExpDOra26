<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Experiência de Oração 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Montserrat:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      font-family:'Montserrat', sans-serif;
      background:#0a0200;
      user-select: none;
      -webkit-user-select: none;
    }

    #landscape {
      position:fixed; inset:0;
      width:100%; height:100%;
      z-index:0;
      opacity:0;
      transition: opacity 2s ease;
      background-image: url('5.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    #landscape.visible { opacity: 0.35; } 

    #star-canvas {
      position:fixed; inset:0;
      width:100%; height:100%;
      z-index:1;
      opacity:1;
      transition: opacity 1.8s ease;
      pointer-events:none;
    }
    #star-canvas.gone { opacity:0; }

    #night-overlay {
      position:fixed; inset:0;
      background: radial-gradient(circle at bottom, #4a0900 0%, #0a0200 80%);
      z-index:2;
      opacity:1;
      transition: opacity 2.5s ease;
      pointer-events:none;
    }
    #night-overlay.gone { opacity:0; }

    #frost-overlay {
      position:fixed; inset:0;
      background: rgba(20, 4, 0, 0.85);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index:3;
      opacity:0;
      transition: opacity 1.5s ease;
      pointer-events:none;
    }
    #frost-overlay.visible { opacity:1; }

    /* Zonas de toque do Story (Esquerda e Direita) */
    .story-nav {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 30%;
      z-index: 40;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #prev-zone { left: 0; }
    #next-zone { right: 0; }

    .scene {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      justify-content:center; align-items:center;
      text-align:center; padding:30px 20px;
      opacity:0; pointer-events:none;
      transition: opacity 1.5s ease;
      z-index:10;
    }
    .scene.active { opacity:1; pointer-events: auto; }

    .art-icon {
      width: clamp(300px, 45vw, 220px);
      height: clamp(300px, 45vw, 220px);
      margin-bottom: 20px;
      object-fit: contain;
      animation: floatUp 1.5s ease both, floating 3s ease-in-out infinite alternate;
      filter: drop-shadow(0px 8px 15px rgba(255, 87, 34, 0.5));
    }

    #s1 .question {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(2rem, 6.5vw, 3rem);
      font-weight:700; text-transform: uppercase;
      color:#ffea00;
      text-shadow: 0 0 40px rgba(255, 60, 0, 0.8), 2px 2px 4px rgba(0,0,0,0.8);
      max-width:450px; line-height:1.2;
      animation: floatUp 1.8s ease both;
    }
    #s1 .dots { margin-top:25px; display:flex; gap:10px; }
    #s1 .dots span {
      width:8px; height:8px; border-radius:50%;
      background:#ff5722;
      box-shadow: 0 0 10px #ff5722;
      animation: blink 1.5s infinite;
    }
    #s1 .dots span:nth-child(2){animation-delay:.3s}
    #s1 .dots span:nth-child(3){animation-delay:.6s}

    #s2 .promise {
      font-size:clamp(1.30rem, 4.2vw, 1.8rem);
      font-weight:600; font-style:italic;
      color:rgba(255, 220, 150, 0.95);
      max-width:450px; line-height:1.4;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
      animation: floatUp 1.8s ease both;
    }
    #s2 .spark {
      margin-top:30px;
      width:18px; height:18px; border-radius:50%;
      background:radial-gradient(circle, #fff, #ffeb3b, #dd2c00);
      box-shadow: 0 0 30px 15px rgba(255, 87, 34, 0.6);
      animation: pulse 2s ease-in-out infinite, floatUp 1s .7s both;
    }

    /* =========================================
       S3: PÔSTER COM FOGO ESTILO "SILK/CHAMA ORGÂNICA"
    ========================================= */
    #s3 {
      justify-content:center;
      padding:0;
      overflow:hidden;
      background: #fcd53f; 
    }
    
    #s3::before {
      content:"";
      position:absolute; inset:0;
      background-image: radial-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
      background-size: 4px 4px;
      mix-blend-mode: multiply;
      opacity: 0.8;
      pointer-events:none;
    }

    #s3 .poster-inner {
      position:relative;
      width:100%; height:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding: 15px;
    }

    #s3 .ostensorio-icon {
      position:absolute;
      top: 27%; left: -28%;
      width: clamp(255px, 36vw, 220px);
      rotate: z -2deg;
      filter: drop-shadow(3px 5px 0px rgba(0,0,0,0.15));
      animation: floatUp 1.3s .2s ease both, floating 3.5s ease-in-out infinite alternate;
    }

    #s3 .id-icon {
      position:absolute;
      top: 20%; left: 2%;
      width: clamp(420px, 36vw, 220px);
      filter: drop-shadow(3px 5px 0px rgba(0,0,0,0.15));
      animation: floatUp 1.2s ease both, floating 3s ease-in-out infinite alternate;
    }

    #s3 .lampada-icon {
      position:absolute;
      bottom: 8%; right: -15%;
      width: clamp(250px, 42vw, 240px);
      rotate: z 5deg;
      filter: drop-shadow(3px 5px 0px rgba(0,0,0,0.15));
      animation: floatUp 1.3s .2s ease both, floating 3.5s ease-in-out infinite alternate;
      z-index: 5;
    }

    /* CONTANEIR DA CHAMA ORGÂNICA (Estilo da Foto) */
    .organic-fire-container {
      position: absolute;
      bottom: 25%;
      right: 5%;
      width: 90px;
      height: 160px;
      z-index: 6;
      pointer-events: none;
      filter: blur(1.5px);
    }

    .fire-wave {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 45px;
      height: 140px;
      background: linear-gradient(0deg, rgba(255,160,0,0) 0%, rgba(255,200,50,0.85) 50%, rgba(255,255,255,0.95) 100%);
      border-radius: 50% 50% 20% 20% / 80% 80% 20% 20%;
      transform-origin: bottom center;
      animation: organicWave 2.2s ease-in-out infinite alternate;
      mix-blend-mode: screen;
    }

    .fire-wave:nth-child(2) {
      width: 30px;
      height: 110px;
      background: linear-gradient(0deg, rgba(255,80,0,0) 0%, rgba(255,150,0,0.7) 60%, rgba(255,230,100,0.9) 100%);
      animation: organicWave2 1.6s ease-in-out infinite alternate;
      left: 30%;
    }

    .fire-wave:nth-child(3) {
      width: 20px;
      height: 80px;
      background: linear-gradient(0deg, rgba(255,40,0,0) 0%, rgba(255,100,0,0.8) 50%, rgba(255,255,255,1) 100%);
      animation: organicWave3 1.2s ease-in-out infinite alternate;
      left: 60%;
    }

    /* ── S4: Chamada para Ação (CTA) ── */
    #s4 { gap: 0; pointer-events: auto; }
    #s4 .open-label {
      font-size:clamp(1rem,3vw,1.2rem); font-weight:600;
      letter-spacing:.25em; text-transform:uppercase;
      color:#ffcc80;
      margin-bottom:12px;
      animation: floatUp 1s ease both;
    }
    #s4 .cta-title {
      font-family: 'Oswald', sans-serif;
      font-size:clamp(2.5rem,8vw,4rem); font-weight:700; text-transform: uppercase;
      color:#fff;
      text-shadow: 0 0 35px rgba(255, 60, 0, 0.6);
      line-height:1.2;
      animation: floatUp 1s .2s ease both;
    }
    #s4 .btn {
      display:inline-block; margin-top:35px;
      padding:18px 45px;
      background:linear-gradient(135deg, #ff9800, #dd2c00);
      color:#fff;
      font-family:'Montserrat', sans-serif;
      font-size:1.1rem; font-weight:700;
      letter-spacing:.15em; text-transform:uppercase;
      text-decoration:none; border-radius:60px;
      box-shadow: 0 6px 30px rgba(221, 44, 0, 0.5), 0 2px 10px rgba(0,0,0,.5);
      animation: floatUp 1s .4s ease both, btnGlow 2.5s 1.5s ease-in-out infinite;
      transition: transform .2s, box-shadow .2s;
      z-index: 100;
      position: relative;
      cursor: pointer;
    }
    #s4 .btn:hover, #s4 .btn:active {
      transform: scale(1.05) translateY(-3px);
      box-shadow: 0 10px 45px rgba(255, 87, 34, 0.8);
    }
    #s4 .sub {
      margin-top:25px;
      font-size:clamp(0.9rem,2.5vw,1rem); font-weight: 300;
      color:rgba(255, 255, 255, 0.7);
      animation: floatUp 1s .6s ease both;
      z-index: 50;
      position: relative;
    }

    /* ── PROGRESSO E DICAS ── */
    #progress {
      position:fixed; bottom:25px; left:50%;
      transform:translateX(-50%);
      display:flex; gap:12px; z-index:60;
    }
    .pdot {
      width:8px; height:8px; border-radius:50%;
      background:rgba(255, 87, 34, 0.3);
      transition:background .4s, transform .3s, box-shadow .3s; cursor:pointer;
    }
    .pdot.active { 
      background:#ffea00; 
      transform:scale(1.5); 
      box-shadow: 0 0 10px #ff9800;
    }

    #tap-hint {
      position:fixed; bottom:55px; left:50%;
      transform:translateX(-50%);
      font-size:.75rem; letter-spacing:.15em; text-transform:uppercase;
      color:rgba(255,255,255,.4);
      animation:blink 2.5s infinite;
      z-index:60; pointer-events:none;
      transition:opacity .8s;
    }

    .real-fire-img {
  position: absolute;
  bottom: -10%;
  right: -60%;
  width: 700px;
  height: auto;
  filter: drop-shadow(0 0 15px rgba(255, 140, 0, 0.6));
  animation: floating 3s ease-in-out infinite alternate;
  z-index: -1;
}

    /* ── KEYFRAMES ── */
    @keyframes floatUp {
      from{opacity:0;transform:translateY(25px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }
    @keyframes floating {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }
    @keyframes pulse {
      0%,100%{transform:scale(1);box-shadow:0 0 30px 15px rgba(255, 87, 34, 0.4)}
      50%{transform:scale(1.2);box-shadow:0 0 45px 20px rgba(255, 152, 0, 0.7)}
    }
    @keyframes btnGlow {
      0%,100%{box-shadow:0 6px 30px rgba(221, 44, 0, 0.5),0 2px 10px rgba(0,0,0,.5)}
      50%{box-shadow:0 6px 50px rgba(255, 152, 0, 0.8),0 2px 10px rgba(0,0,0,.3)}
    }

    /* Animações fluidas imitando a imagem de referência */
    @keyframes organicWave {
      0% { transform: translateX(-50%) scale(1, 1) rotate(-4deg) skewX(2deg); }
      50% { transform: translateX(-40%) scale(1.15, 0.95) rotate(2deg) skewX(-3deg); }
      100% { transform: translateX(-60%) scale(0.9, 1.1) rotate(-2deg) skewX(4deg); }
    }
    @keyframes organicWave2 {
      0% { transform: translateX(-50%) scale(0.9, 1.05) rotate(3deg) skewX(-2deg); }
      100% { transform: translateX(-35%) scale(1.2, 0.9) rotate(-4deg) skewX(3deg); }
    }
    @keyframes organicWave3 {
      0% { transform: translateX(-50%) scale(1, 0.9) rotate(-2deg); }
      100% { transform: translateX(-65%) scale(1.1, 1.15) rotate(4deg); }
    }

    /* =========================================
   S3: CHAMA REALISTA (INSPIRADA NA IMAGEM)
========================================= */
.organic-fire-container {
  position: absolute;
  bottom: 18%;
  right: 10%;
  width: 140px;
  height: 260px;
  z-index: 6;
  pointer-events: none;
  filter: drop-shadow(0 0 20px rgba(255, 120, 0, 0.8));
}

/* Base quente da chama (Núcleo amarelado/brilhante) */
.organic-fire-container::before {
  content: "";
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 60px;
  background: radial-gradient(circle, #ffffff 10%, #ffea00 40%, #ff5722 80%, transparent 100%);
  border-radius: 50%;
  filter: blur(8px);
  opacity: 0.95;
  animation: corePulse 1.5s ease-in-out infinite alternate;
}

/* Camadas de chamas fluidas */
.fire-wave {
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 70px;
  height: 220px;
  background: linear-gradient(
    0deg,
    rgba(255, 230, 100, 0.9) 0%,
    rgba(255, 140, 0, 0.7) 45%,
    rgba(230, 60, 0, 0.3) 80%,
    transparent 100%
  );
  border-radius: 40% 60% 30% 70% / 60% 50% 50% 40%;
  transform-origin: bottom center;
  mix-blend-mode: screen;
  filter: blur(3px);
  animation: realisticFlame1 2s ease-in-out infinite alternate;
}

.fire-wave:nth-child(2) {
  width: 50px;
  height: 180px;
  background: linear-gradient(
    0deg,
    rgba(255, 255, 255, 0.95) 0%,
    rgba(255, 180, 0, 0.8) 40%,
    rgba(255, 70, 0, 0.4) 75%,
    transparent 100%
  );
  border-radius: 50% 50% 20% 80% / 70% 40% 60% 30%;
  animation: realisticFlame2 1.6s ease-in-out infinite alternate;
  filter: blur(2px);
}

.fire-wave:nth-child(3) {
  width: 35px;
  height: 130px;
  background: linear-gradient(
    0deg,
    #ffffff 0%,
    rgba(255, 220, 0, 0.9) 50%,
    rgba(255, 90, 0, 0.5) 85%,
    transparent 100%
  );
  border-radius: 60% 40% 50% 50% / 80% 60% 40% 40%;
  animation: realisticFlame3 1.2s ease-in-out infinite alternate;
  filter: blur(1.5px);
}

/* ── KEYFRAMES PARA MOVIMENTO FLUIDO DA CHAMA ── */
@keyframes corePulse {
  0% { transform: translateX(-50%) scale(0.9); opacity: 0.8; }
  100% { transform: translateX(-50%) scale(1.1); opacity: 1; }
}

@keyframes realisticFlame1 {
  0% {
    transform: translateX(-50%) rotate(-3deg) scaleX(1) scaleY(1);
    border-radius: 40% 60% 30% 70% / 60% 50% 50% 40%;
  }
  50% {
    transform: translateX(-45%) rotate(2deg) scaleX(1.1) scaleY(0.95);
    border-radius: 50% 50% 40% 60% / 50% 60% 40% 50%;
  }
  100% {
    transform: translateX(-55%) rotate(-2deg) scaleX(0.9) scaleY(1.05);
    border-radius: 30% 70% 50% 50% / 70% 40% 60% 30%;
  }
}

@keyframes realisticFlame2 {
  0% {
    transform: translateX(-50%) rotate(4deg) scale(0.95);
  }
  100% {
    transform: translateX(-40%) rotate(-4deg) scale(1.05);
  }
}

@keyframes realisticFlame3 {
  0% {
    transform: translateX(-50%) rotate(-2deg) scaleY(0.9);
  }
  100% {
    transform: translateX(-60%) rotate(3deg) scaleY(1.1);
  }
}
    
  </style>
</head>
<body>

<div id="landscape"></div>
<canvas id="star-canvas"></canvas>
<div id="night-overlay"></div>
<div id="frost-overlay"></div>

<!-- Zonas de clique estilo Story -->
<div id="prev-zone" class="story-nav"></div>
<div id="next-zone" class="story-nav"></div>

<!-- CENA 1 -->
<section class="scene active" id="s1">
  <img src="icons/caixa de fosforo.png" alt="Caixa de Fósforo" class="art-icon">
  <p class="question">Você já sentiu seu coração queimar?</p>
  <div class="dots"><span></span><span></span><span></span></div>
</section>

<!-- CENA 2 -->
<section class="scene" id="s2">
  <img src="icons/fosforo.png" alt="Fósforo" class="art-icon">
  <p class="promise">Que tal experimentar desse fogo?</p>
  <div class="spark"></div>
</section>

<!-- CENA 3 -->
<section class="scene" id="s3">
  <div class="poster-inner">
    <img src="icons/ostensorio.png" alt="Ostensório" class="ostensorio-icon">
    <img src="icons/lampada.png" alt="Lâmpada" class="lampada-icon">
    <img src="icons/ID.png" alt="Logo" class="id-icon">
    
    <img src="icons/fogo.png" alt="Chama" class="real-fire-img">
  </div>
</section>

<!-- CENA 4 -->
<section class="scene" id="s4">
  <p class="open-label">O Fogo vai descer</p>
  <h2 class="cta-title">Garanta sua Vaga!</h2>
  <a href="https://forms.gle/N8h3qaWNAs4FfUWw5" target="_blank" class="btn" id="cta-btn">QUERO QUEIMAR DE AMOR</a>
  <p class="sub">Sábado | 16h • Paróquia N.S. Rainha dos Apóstolos</p>
</section>

<div id="progress">
  <div class="pdot active" data-i="0"></div>
  <div class="pdot" data-i="1"></div>
  <div class="pdot" data-i="2"></div>
  <div class="pdot" data-i="3"></div>
</div>
<p id="tap-hint">toque nas laterais para navegar</p>

<script>
// ========================================================
// 1. NAVEGAÇÃO E ESTADO PRINCIPAL
// ========================================================
const landscape     = document.getElementById('landscape');
const nightOverlay  = document.getElementById('night-overlay');
const frostOverlay  = document.getElementById('frost-overlay');
const starCvs       = document.getElementById('star-canvas');
const scenes        = document.querySelectorAll('.scene');
const dots          = document.querySelectorAll('.pdot');
const hint          = document.getElementById('tap-hint');
const prevZone      = document.getElementById('prev-zone');
const nextZone      = document.getElementById('next-zone');
const ctaBtn        = document.getElementById('cta-btn');

let cur = 0, timer, hintGone = false;

function applyTheme(i) {
  if (i <= 1) {
    nightOverlay.classList.remove('gone');
    starCvs.classList.remove('gone');
    landscape.classList.remove('visible');
    frostOverlay.classList.remove('visible');
  } else if (i === 2) {
    landscape.classList.add('visible');
    nightOverlay.classList.add('gone');
    starCvs.classList.remove('gone');
    frostOverlay.classList.remove('visible');
  } else {
    landscape.classList.add('visible');
    nightOverlay.classList.add('gone');
    starCvs.classList.add('gone');
    frostOverlay.classList.add('visible');
  }
}

function goTo(i) {
  if (i < 0 || i >= scenes.length) return;
  scenes[cur].classList.remove('active'); 
  dots[cur].classList.remove('active');
  cur = i;
  scenes[cur].classList.add('active'); 
  dots[cur].classList.add('active');
  
  const isLastScene = (cur === scenes.length - 1);
  prevZone.style.display = isLastScene ? 'none' : 'block';
  nextZone.style.display = isLastScene ? 'none' : 'block';

  applyTheme(cur);
  if (!hintGone) { hint.style.opacity = '0'; hintGone = true; }
  resetTimer();
}

function next() { 
  if (cur < scenes.length - 1) {
    goTo(cur + 1);
  } else {
    goTo(0); 
  }
}

function prev() {
  if (cur > 0) {
    goTo(cur - 1);
  }
}

function resetTimer() {
  clearInterval(timer);
  const delay = 5000;
  if (cur === scenes.length - 1) {
    clearInterval(timer);
    return;
  }
  timer = setInterval(next, delay);
}

prevZone.addEventListener('click', (e) => {
  e.stopPropagation();
  prev();
});

nextZone.addEventListener('click', (e) => {
  e.stopPropagation();
  next();
});

ctaBtn.addEventListener('click', (e) => {
  e.stopPropagation();
});

let tx = 0, ty = 0;
document.addEventListener('touchstart', e => { 
  tx = e.touches[0].clientX; 
  ty = e.touches[0].clientY; 
}, {passive:true});

document.addEventListener('touchend', e => {
  if (cur === scenes.length - 1) return;
  const dx = tx - e.changedTouches[0].clientX;
  const dy = Math.abs(ty - e.changedTouches[0].clientY);
  if (Math.abs(dx) > 40 && dy < 60) {
    dx > 0 ? next() : prev();
  }
}, {passive:true});

dots.forEach(d => d.addEventListener('click', e => { 
  e.stopPropagation(); 
  goTo(+d.dataset.i); 
}));

applyTheme(0);
resetTimer();

// ========================================================
// 2. CANVAS / FAGULHAS BLINDADO
// ========================================================
try {
  const sCvs = document.getElementById('star-canvas');
  const sCtx = sCvs.getContext('2d');
  let sW, sH;

  const maxEmbers = 160;
  const embers = Array.from({length: maxEmbers}, () => ({
    x: Math.random(), 
    y: Math.random(),
    r: Math.random() * 2.2 + 0.6,
    ph: Math.random() * Math.PI * 2,
    spX: (Math.random() - 0.5) * 0.002, 
    spY: Math.random() * 0.004 + 0.001 
  }));

  function resizeStar() { 
    if (!sCvs) return;
    sW = sCvs.width = innerWidth; 
    sH = sCvs.height = innerHeight; 
  }

  function drawEmbers(T) {
    if (!sCtx) return;
    sCtx.clearRect(0, 0, sW, sH);
    const activeCount = Math.min(maxEmbers, 40 + (cur * 40));

    for(let i = 0; i < activeCount; i++) {
      let e = embers[i];
      let speedMultiplier = 1 + (cur * 0.4);
      
      e.y -= (e.spY * speedMultiplier);
      e.x += e.spX;

      if(e.y < -0.05) {
        e.y = 1.05;
        e.x = Math.random();
      }

      const a = 0.25 + 0.75 * Math.abs(Math.sin(T * (3 + cur) + e.ph));
      
      sCtx.beginPath();
      sCtx.arc(e.x * sW, e.y * sH, e.r, 0, Math.PI * 2);
      
      const colorType = i % 3;
      if(colorType === 0) sCtx.fillStyle = `rgba(255, 234, 0, ${a})`; 
      else if(colorType === 1) sCtx.fillStyle = `rgba(255, 152, 0, ${a})`; 
      else sCtx.fillStyle = `rgba(255, 87, 34, ${a})`; 
      
      sCtx.fill();
    }
  }

  let T = 0;
  function loop() {
    T += 0.015;
    drawEmbers(T);
    requestAnimationFrame(loop);
  }
  window.addEventListener('resize', resizeStar);
  resizeStar(); 
  loop();
} catch (error) {
  console.warn("Canvas desativado ou incompatível neste ambiente:", error);
}
</script>
